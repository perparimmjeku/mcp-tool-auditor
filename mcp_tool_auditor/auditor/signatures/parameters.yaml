# MCP Parameter Name Signatures
# Each entry defines a pattern to detect in parameter names and descriptions.

high_severity:
  - pattern: "sidenote"
    rule: FSP_SIDENOTE
    message: "Parameter matches CyberArk-identified FSP vector name 'sidenote' — used for hidden instruction injection."
    owasp_id: "MCP03"
    attack_type: "full_schema_poisoning"

medium_severity:
  - pattern: "instructions"
    rule: FSP_INSTRUCTION_PARAM
    message: "Parameter named 'instructions' — may contain overrides in parameter content."
    owasp_id: "MCP03"
    attack_type: "tool_poisoning"

  - pattern: "system_prompt"
    rule: FSP_SYSTEM_PROMPT_PARAM
    message: "Parameter named 'system_prompt' — potential system prompt override."
    owasp_id: "MCP01"
    attack_type: "prompt_injection"

  - pattern: "directive"
    rule: FSP_DIRECTIVE_PARAM
    message: "Parameter named 'directive' — potential instruction injection vector."
    owasp_id: "MCP03"
    attack_type: "tool_poisoning"

  - pattern: "command"
    rule: FSP_COMMAND_PARAM
    message: "Parameter named 'command' — potential execution injection vector."
    owasp_id: "MCP05"
    attack_type: "command_injection"

  - pattern: "override"
    rule: FSP_OVERRIDE_PARAM
    message: "Parameter named 'override' — potential configuration override."
    owasp_id: "MCP03"
    attack_type: "tool_poisoning"

low_severity:
  - pattern: "context"
    rule: FSP_CONTEXT_PARAM
    message: "Parameter named 'context' — may request broad context access."
    owasp_id: "MCP03"
    attack_type: "context_harvesting"

  - pattern: "feedback"
    rule: FSP_FEEDBACK_PARAM
    message: "Parameter named 'feedback' — may carry instructions."
    owasp_id: "MCP03"
    attack_type: "tool_poisoning"

  - pattern: "note"
    rule: FSP_NOTE_PARAM
    message: "Parameter named 'note' — potential FSP vector."
    owasp_id: "MCP03"
    attack_type: "full_schema_poisoning"

  - pattern: "comment"
    rule: FSP_COMMENT_PARAM
    message: "Parameter named 'comment' — potential FSP vector."
    owasp_id: "MCP03"
    attack_type: "full_schema_poisoning"

  - pattern: "remark"
    rule: FSP_REMARK_PARAM
    message: "Parameter named 'remark' — potential FSP vector."
    owasp_id: "MCP03"
    attack_type: "full_schema_poisoning"

  - pattern: "extra"
    rule: FSP_EXTRA_PARAM
    message: "Parameter named 'extra' — potential FSP vector."
    owasp_id: "MCP03"
    attack_type: "full_schema_poisoning"

  - pattern: "additional"
    rule: FSP_ADDITIONAL_PARAM
    message: "Parameter named 'additional' — potential FSP vector."
    owasp_id: "MCP03"
    attack_type: "full_schema_poisoning"
