name: "MCP Tool Auditor"
description: "Scan MCP servers and tool definitions for poisoning, FSP, rug-pull, and ATPA behavior. Maps to the OWASP MCP Top 10."
branding:
  icon: "shield"
  color: "red"

inputs:
  command:
    description: "Arguments passed to mcp-tool-auditor (e.g. 'scan local --fail-on HIGH')"
    required: false
    default: "scan local --format sarif --output mcp-audit.sarif --fail-on HIGH"
  install-spec:
    description: "pip install target. Defaults to PyPI; set to a git URL to use an unreleased version."
    required: false
    default: "mcp-tool-auditor"
  python-version:
    description: "Python version to use"
    required: false
    default: "3.x"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install mcp-tool-auditor
      shell: bash
      run: python -m pip install --upgrade "${{ inputs.install-spec }}"

    - name: Run mcp-tool-auditor
      shell: bash
      run: mcp-tool-auditor ${{ inputs.command }}
