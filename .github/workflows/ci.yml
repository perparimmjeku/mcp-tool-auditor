name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check mcp_tool_auditor tests

      - name: Format check with black
        run: black --check mcp_tool_auditor tests

      - name: Type-check with mypy
        run: mypy mcp_tool_auditor

      - name: Run tests
        run: python -m pytest tests/ -v --cov=mcp_tool_auditor --cov-report=xml
